title: >-
  Qualité de l'air : dépassement du seuil en particules fines
level: info
content: >-
  <p>Une dégradation de la qualité de l'air ambiant est annoncée sur le département, avec des niveaux élevés de particules fines. Retrouvez les recommandations sur le site d'airbreizh. Le STAR met en place le Pass Qualité de l'Air qui permet de circuler pour 1,70 € sur l'ensemble du réseau bus + métro, toute la journée du samedi 21 mars.    </p>
